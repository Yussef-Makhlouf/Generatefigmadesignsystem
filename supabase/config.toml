# ============================================================
# Supabase Project Configuration
# ============================================================

project_id = "khebre-platform"

[auth]
site_url = "https://khebre.com"
additional_redirect_urls = [
  "https://khebre.com/*",
  "http://localhost:5173/*"
]

[auth.rate_limit]
sign_in = 30
sign_up = 3
token_refresh = 150

[auth.email]
enable_signup = true
double_confirm_changes = true

[api]
max_rows = 1000

[functions]
path = "./functions"
# Individual function configurations can be declared below if needed
# [functions.send-notification]
# verify_jwt = true
